<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HandBoard — Draw With Your Hand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #000;
            --fg: #fff;
            --muted: #666;
            --border: #2a2a2a;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Fira Code', monospace;
            touch-action: none;
            user-select: none;
        }

        /* ── Full-screen app ── */
        #app {
            position: fixed;
            inset: 0;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── Drawing canvas fills everything ── */
        #draw-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: none;
        }

        /* ── Floating toolbar (top, translucent) ── */
        #toolbar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            z-index: 30;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            white-space: nowrap;
        }

        #toolbar h1 {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: var(--fg);
            padding-right: 4px;
        }

        .sep {
            width: 1px;
            height: 16px;
            background: var(--border);
        }

        .btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--fg);
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 20px;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border);
        }

        .btn.active {
            background: #fff;
            color: #000;
        }

        /* Sliders */
        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .slider-label {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 3px;
            background: var(--border);
            outline: none;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        /* ── Floating video — bottom left PiP ── */
        #pip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 170px;
            aspect-ratio: 9/16;
            /* portrait video */
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 30;
            background: #111;
        }

        #cam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* mirror */
            display: block;
        }

        /* skeleton overlay on pip */
        #cam-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
        }

        /* pip label */
        #pip-label {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 8px;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            pointer-events: none;
        }

        /* ── Cursor dot ── */
        #cursor-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            z-index: 25;
            transition: width 0.1s, height 0.1s;
        }

        #cursor-dot.drawing {
            background: rgba(255, 255, 255, 0.3);
        }

        #cursor-dot.erasing {
            border-color: #888;
            background: rgba(100, 100, 100, 0.2);
        }

        #cursor-dot.lifted {
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ── Status toast ── */
        #status {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 14px;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--muted);
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.4s;
        }

        /* ── Gesture hint (bottom centre) ── */
        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 14px;
            font-size: 9px;
            letter-spacing: 0.1em;
            color: var(--muted);
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
        }

        /* ── Camera overlay ── */
        #cam-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 18px;
            transition: opacity 0.4s;
        }

        #cam-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #cam-overlay .icon {
            font-size: 52px;
        }

        #cam-overlay h2 {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: #fff;
        }

        #cam-overlay p {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-align: center;
            max-width: 280px;
            line-height: 1.8;
        }

        #btn-allow {
            margin-top: 10px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 40px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 600;
            padding: 14px 36px;
            cursor: pointer;
            letter-spacing: 0.1em;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--fg);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── QR Modal ── */
        #qr-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        #qr-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #qr-box {
            background: #fff;
            color: #000;
            border-radius: 12px;
            padding: 24px 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        #qr-box p {
            font-size: 10px;
            letter-spacing: 0.1em;
            color: #555;
        }

        #qr-url {
            font-size: 11px;
            font-weight: 600;
            color: #000;
            word-break: break-all;
            text-align: center;
            max-width: 220px;
        }

        #qr-close {
            background: #000;
            color: #fff;
            border: none;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            padding: 8px 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Mobile tweaks */
        @media (max-width: 600px) {
            #toolbar {
                top: 8px;
                padding: 5px 10px;
                gap: 6px;
            }

            #toolbar h1 {
                display: none;
            }

            .btn {
                font-size: 10px;
                padding: 4px 8px;
            }

            #pip {
                width: 120px;
                bottom: 14px;
                left: 14px;
            }
        }
    </style>
</head>

<body>

    <!-- Camera overlay -->
    <div id="cam-overlay">
        <div class="icon">📷</div>
        <h2>Camera Access</h2>
        <p>HandBoard needs your camera to track your hand. Tap the button and allow access.</p>
        <button id="btn-allow">Open Camera</button>
        <div class="spinner" id="boot-spinner" style="display:none"></div>
    </div>

    <!-- Main app -->
    <div id="app">

        <!-- Full-screen drawing canvas -->
        <canvas id="draw-canvas"></canvas>
        <div id="cursor-dot"></div>
        <div id="status">Starting…</div>
        <div id="hint">👌 Pinch (OK sign) = Draw &nbsp;·&nbsp; ✋ Open palm = Erase</div>

        <!-- Floating toolbar -->
        <div id="toolbar">
            <h1>✦ HandBoard</h1>
            <div class="sep"></div>
            <button class="btn active" id="btn-draw">✏ Draw</button>
            <button class="btn" id="btn-erase">◻ Erase</button>
            <div class="sep"></div>
            <div class="slider-wrap">
                <span class="slider-label">Size</span>
                <input type="range" id="brush-size" min="2" max="40" value="6" />
            </div>
            <div class="sep"></div>
            <div class="slider-wrap">
                <span class="slider-label">Sens</span>
                <input type="range" id="sensitivity" min="1" max="10" value="5" />
            </div>
            <div class="sep"></div>
            <button class="btn" id="btn-clear">⊘ Clear</button>
            <button class="btn" id="btn-save">↓ Save</button>
            <div class="sep"></div>
            <button class="btn" id="btn-qr">⊞ QR</button>
        </div>

        <!-- Floating video PiP — bottom left -->
        <div id="pip">
            <video id="cam-video" autoplay playsinline muted></video>
            <canvas id="cam-canvas"></canvas>
            <span id="pip-label">📷 live</span>
        </div>

    </div>

    <!-- QR Modal -->
    <div id="qr-overlay">
        <div id="qr-box">
            <p>SCAN TO OPEN ON PHONE</p>
            <canvas id="qr-canvas"></canvas>
            <div id="qr-url"></div>
            <button id="qr-close">✕ Close</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"
        crossorigin="anonymous"></script>

    <script>
        // ── DOM refs ──────────────────────────────────────────────
        const appEl = document.getElementById('app');
        const drawCanvas = document.getElementById('draw-canvas');
        const camVideo = document.getElementById('cam-video');
        const camCanvas = document.getElementById('cam-canvas');
        const cursorDot = document.getElementById('cursor-dot');
        const statusEl = document.getElementById('status');
        const hintEl = document.getElementById('hint');
        const btnDraw = document.getElementById('btn-draw');
        const btnErase = document.getElementById('btn-erase');
        const btnClear = document.getElementById('btn-clear');
        const btnSave = document.getElementById('btn-save');
        const btnQR = document.getElementById('btn-qr');
        const brushSlider = document.getElementById('brush-size');
        const sensSlider = document.getElementById('sensitivity');
        const qrOverlay = document.getElementById('qr-overlay');
        const qrCanvas = document.getElementById('qr-canvas');
        const qrUrlEl = document.getElementById('qr-url');
        const qrClose = document.getElementById('qr-close');
        const camOverlay = document.getElementById('cam-overlay');
        const btnAllow = document.getElementById('btn-allow');
        const bootSpinner = document.getElementById('boot-spinner');
        const pipEl = document.getElementById('pip');

        const ctx = drawCanvas.getContext('2d');
        const camCtx = camCanvas.getContext('2d');

        // ── State ─────────────────────────────────────────────────
        let mode = 'draw';
        let brushSize = 6;
        let sensitivity = 5;   // 1–10; higher = more reactive (lower lift threshold)
        let prevX = null, prevY = null;
        let smoothX = null, smoothY = null;

        // ── Canvas resize ─────────────────────────────────────────
        function resizeCanvases() {
            // Preserve drawing
            const tmp = document.createElement('canvas');
            tmp.width = drawCanvas.width; tmp.height = drawCanvas.height;
            tmp.getContext('2d').drawImage(drawCanvas, 0, 0);

            drawCanvas.width = window.innerWidth;
            drawCanvas.height = window.innerHeight;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
            ctx.drawImage(tmp, 0, 0);

            const pip = pipEl.getBoundingClientRect();
            camCanvas.width = pip.width;
            camCanvas.height = pip.height;
        }
        window.addEventListener('resize', resizeCanvases);

        // ── Drawing ───────────────────────────────────────────────
        function drawStroke(x, y) {
            ctx.lineWidth = mode === 'erase' ? brushSize * 5 : brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = mode === 'erase' ? '#000' : '#fff';
            ctx.globalCompositeOperation = mode === 'erase' ? 'destination-out' : 'source-over';

            if (prevX === null) {
                ctx.beginPath();
                ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(prevX, prevY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
            prevX = x; prevY = y;
        }

        function liftPen() {
            prevX = null; prevY = null;
            ctx.globalCompositeOperation = 'source-over';
        }

        // ── Smoothing (exponential moving average) ────────────────
        function smooth(nx, ny) {
            // alpha: higher sensitivity = less smoothing = more responsive
            const alpha = 0.3 + (sensitivity - 1) * 0.07; // 0.30 – 0.93
            if (smoothX === null) { smoothX = nx; smoothY = ny; }
            smoothX = alpha * nx + (1 - alpha) * smoothX;
            smoothY = alpha * ny + (1 - alpha) * smoothY;
            return { x: smoothX, y: smoothY };
        }

        // ── Toolbar ───────────────────────────────────────────────
        btnDraw.addEventListener('click', () => {
            mode = 'draw'; btnDraw.classList.add('active'); btnErase.classList.remove('active');
        });
        btnErase.addEventListener('click', () => {
            mode = 'erase'; btnErase.classList.add('active'); btnDraw.classList.remove('active');
        });
        btnClear.addEventListener('click', () => {
            ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
        });
        btnSave.addEventListener('click', () => {
            const a = document.createElement('a');
            a.download = `handboard_${Date.now()}.png`;
            a.href = drawCanvas.toDataURL('image/png');
            a.click();
        });
        brushSlider.addEventListener('input', () => brushSize = +brushSlider.value);
        sensSlider.addEventListener('input', () => {
            sensitivity = +sensSlider.value;
            smoothX = null; smoothY = null; // reset smoothing on change
        });

        // QR
        let qrGen = false;
        btnQR.addEventListener('click', () => {
            const url = window.location.href;
            qrUrlEl.textContent = url;
            if (!qrGen && typeof QRCode !== 'undefined') {
                QRCode.toCanvas(qrCanvas, url, {
                    width: 200, margin: 1,
                    color: { dark: '#000', light: '#fff' }
                }, () => { });
                qrGen = true;
            }
            qrOverlay.classList.add('show');
        });
        qrClose.addEventListener('click', () => qrOverlay.classList.remove('show'));
        qrOverlay.addEventListener('click', e => { if (e.target === qrOverlay) qrOverlay.classList.remove('show'); });

        // ── Gesture helpers ───────────────────────────────────────
        const THUMB_TIP = 4, INDEX_TIP = 8, INDEX_MCP = 5,
            MIDDLE_TIP = 12, MIDDLE_MCP = 9, RING_TIP = 16,
            RING_MCP = 13, PINKY_TIP = 20, PINKY_MCP = 17,
            WRIST = 0;

        function dist(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y);
        }

        // Finger extended: tip clearly above MCP (base knuckle)
        // threshold scales with sensitivity: higher sens = easier to trigger
        function fingerExtended(lm, tip, mcp) {
            const threshold = 0.04 - (sensitivity - 1) * 0.003; // 0.04 → 0.013
            return (lm[mcp].y - lm[tip].y) > threshold;
        }

        // 👌 OK/pinch: thumb tip close to index tip = DRAW
        function isPinchDraw(lm) {
            const pinchDist = dist(lm[THUMB_TIP], lm[INDEX_TIP]);
            // threshold loosens with sensitivity (higher = easier to trigger)
            const threshold = 0.05 + (sensitivity - 1) * 0.008; // 0.05 – 0.122
            return pinchDist < threshold;
        }

        function isOpenPalm(lm) {
            return fingerExtended(lm, INDEX_TIP, INDEX_MCP) &&
                fingerExtended(lm, MIDDLE_TIP, MIDDLE_MCP) &&
                fingerExtended(lm, RING_TIP, RING_MCP) &&
                fingerExtended(lm, PINKY_TIP, PINKY_MCP);
        }

        function isFist(lm) {
            return !fingerExtended(lm, INDEX_TIP, INDEX_MCP) &&
                !fingerExtended(lm, MIDDLE_TIP, MIDDLE_MCP) &&
                !fingerExtended(lm, RING_TIP, RING_MCP);
        }

        // ── Status ────────────────────────────────────────────────
        let statusTimer;
        function setStatus(msg, hideAfter = 0) {
            statusEl.textContent = msg;
            statusEl.style.opacity = '1';
            clearTimeout(statusTimer);
            if (hideAfter) statusTimer = setTimeout(() => statusEl.style.opacity = '0', hideAfter);
        }

        // ── MediaPipe results ─────────────────────────────────────
        let frameCount = 0;

        function onResults(results) {
            frameCount++;

            // Draw skeleton on cam pip — mirror the canvas coords
            camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
            if (results.multiHandLandmarks) {
                for (const lm of results.multiHandLandmarks) {
                    drawConnectors(camCtx, lm, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.4)', lineWidth: 1 });
                    drawLandmarks(camCtx, lm, { color: '#fff', lineWidth: 1, radius: 2 });
                }
            }

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                liftPen();
                smoothX = null; smoothY = null;
                cursorDot.style.display = 'none';
                if (frameCount > 20) setStatus('✦ No hand detected');
                return;
            }

            const lm = results.multiHandLandmarks[0];

            // Detect pinch early so we can use pinch midpoint as cursor
            const pinching = isPinchDraw(lm);

            // Cursor position: pinch midpoint when 👌, else index tip
            let rawX, rawY;
            if (pinching) {
                rawX = (1 - (lm[THUMB_TIP].x + lm[INDEX_TIP].x) / 2) * window.innerWidth;
                rawY = ((lm[THUMB_TIP].y + lm[INDEX_TIP].y) / 2) * window.innerHeight;
            } else {
                rawX = (1 - lm[INDEX_TIP].x) * window.innerWidth;
                rawY = lm[INDEX_TIP].y * window.innerHeight;
            }
            const { x: cx, y: cy } = smooth(rawX, rawY);

            // Show cursor
            cursorDot.style.display = 'block';
            cursorDot.style.left = cx + 'px';
            cursorDot.style.top = cy + 'px';

            // ── Gesture logic ──
            if (isOpenPalm(lm)) {
                // All 4 fingers up = ERASE
                mode = 'erase';
                btnErase.classList.add('active'); btnDraw.classList.remove('active');
                cursorDot.className = 'erasing';
                drawStroke(cx, cy);
                hintEl.textContent = '✋ Open palm — Erasing';
                setStatus('✦ Eraser', 800);

            } else if (pinching) {
                // 👌 Pinch/OK = DRAW
                mode = 'draw';
                btnDraw.classList.add('active'); btnErase.classList.remove('active');
                cursorDot.className = 'drawing';
                drawStroke(cx, cy);
                hintEl.textContent = '👌 Drawing…';
                statusEl.style.opacity = '0';

            } else {
                // Anything else = lift pen
                liftPen();
                smoothX = null; smoothY = null;
                cursorDot.className = 'lifted';
                hintEl.textContent = '👌 Pinch (OK sign) = Draw · ✋ Open palm = Erase';
            }
        }

        // ── Boot / Camera ─────────────────────────────────────────
        async function startCamera() {
            btnAllow.style.display = 'none';
            bootSpinner.style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                camVideo.srcObject = stream;
                await camVideo.play();

                // Hide overlay
                camOverlay.classList.add('hidden');
                setTimeout(() => camOverlay.style.display = 'none', 450);

                resizeCanvases();
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
                setStatus('✦ Loading hand model…');

                const hands = new Hands({
                    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
                });
                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.5
                });
                hands.onResults(onResults);

                const camera = new Camera(camVideo, {
                    onFrame: async () => await hands.send({ image: camVideo }),
                    width: 1280, height: 720
                });
                await camera.start();
                setStatus('✦ Ready — raise your index finger!', 3000);

            } catch (err) {
                bootSpinner.style.display = 'none';
                btnAllow.style.display = 'block';
                btnAllow.textContent = '⟳ Try Again';
                document.querySelector('#cam-overlay p').textContent =
                    'Could not access camera. Make sure you tapped Allow, then retry.';
            }
        }

        btnAllow.addEventListener('click', startCamera);
        startCamera(); // auto-start immediately
    </script>
</body>

</html>
