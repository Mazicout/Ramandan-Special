<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HandBoard — Draw With Your Hand</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="./qrcode.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Fira Code', monospace;
            touch-action: none;
            user-select: none;
        }

        #cam-video {
            display: none;
        }

        /* Full-screen drawing canvas */
        #c {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            transform: scaleX(-1);
            /* Mirror canvas to match front-facing camera */
            z-index: 10;
        }

        /* ── Floating toolbar ── */
        #toolbar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.78);
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 6px 14px;
            z-index: 50;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            white-space: nowrap;
        }

        #toolbar h1 {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: #fff;
        }

        .sep {
            width: 1px;
            height: 16px;
            background: #2a2a2a;
        }

        .btn {
            background: transparent;
            border: 1px solid transparent;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 20px;
            transition: background .15s, border-color .15s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, .1);
            border-color: #333;
        }

        .btn.active {
            background: #fff;
            color: #000;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .slider-label {
            font-size: 9px;
            color: #666;
            letter-spacing: .1em;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 58px;
            height: 3px;
            background: #2a2a2a;
            outline: none;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        /* ── Floating PiP (bottom-left) ── */
        #pip {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            aspect-ratio: 9/16;
            border-radius: 14px;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, .12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .6);
            z-index: 50;
            background: #111;
        }

        #pip-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }

        #pip-label {
            position: absolute;
            top: 5px;
            left: 7px;
            font-size: 8px;
            letter-spacing: .1em;
            color: rgba(255, 255, 255, .4);
        }

        /* ── Hint ── */
        #hint {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, .65);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 4px 14px;
            font-size: 9px;
            letter-spacing: .1em;
            color: #666;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
        }

        /* ── Camera overlay ── */
        #cam-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 18px;
            transition: opacity .4s;
        }

        #cam-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #cam-overlay .icon {
            font-size: 52px;
        }

        #cam-overlay h2 {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: .1em;
            color: #fff;
        }

        #cam-overlay p {
            font-size: 11px;
            color: #666;
            text-align: center;
            max-width: 280px;
            line-height: 1.8;
        }

        #btn-allow {
            margin-top: 8px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 40px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 600;
            padding: 14px 36px;
            cursor: pointer;
            letter-spacing: .1em;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #222;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── QR Modal ── */
        #qr-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .88);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }

        #qr-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #qr-box {
            background: #fff;
            border-radius: 12px;
            padding: 24px 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        #qr-box p {
            font-size: 10px;
            letter-spacing: .12em;
            color: #555;
        }

        #qr-url {
            font-size: 11px;
            font-weight: 600;
            word-break: break-all;
            text-align: center;
            max-width: 220px;
        }

        #qr-close {
            background: #000;
            color: #fff;
            border: none;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            padding: 8px 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            #toolbar {
                gap: 5px;
                padding: 5px 10px;
            }

            #toolbar h1 {
                display: none;
            }

            .btn {
                font-size: 10px;
                padding: 4px 8px;
            }

            #pip {
                width: 90px;
            }
        }
    </style>
</head>

<body>

    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <!-- Hint -->
    <div id="hint">☝️ Index finger = Draw &nbsp;·&nbsp; ✋ Open palm = Erase &nbsp;·&nbsp; ✊ Fist = Lift pen</div>

    <!-- Toolbar -->
    <div id="toolbar">
        <h1>✦ HandBoard</h1>
        <div class="sep"></div>
        <div class="slider-wrap">
            <span class="slider-label">Size</span>
            <input type="range" id="brush-size" min="2" max="40" value="6" />
        </div>
        <div class="sep"></div>
        <button class="btn" id="btn-clear">⊘ Clear</button>
        <button class="btn" id="btn-save">↓ Save</button>
        <div class="sep"></div>
        <button class="btn" id="btn-qr">⊞ QR</button>
    </div>

    <!-- PiP -->
    <div id="pip">
        <video id="pip-video" autoplay playsinline muted></video>
        <span id="pip-label">📷 live</span>
    </div>

    <!-- Camera overlay -->
    <div id="cam-overlay">
        <div class="icon">📷</div>
        <h2>Camera Access</h2>
        <p>HandBoard needs your camera to track your hand. Tap the button and allow access.</p>
        <button id="btn-allow">Open Camera</button>
        <div class="spinner" id="boot-spinner" style="display:none"></div>
    </div>

    <!-- QR -->
    <div id="qr-overlay">
        <div id="qr-box">
            <p>SCAN TO OPEN ON PHONE</p>
            <canvas id="qr-canvas"></canvas>
            <div id="qr-url"></div>
            <button id="qr-close">✕ Close</button>
        </div>
    </div>

    <script>
        // ── Refs ──────────────────────────────────────────────────
        var camVideo = document.getElementById('cam-video');
        var pipVideo = document.getElementById('pip-video');
        var c = document.getElementById('c');
        var ctx = c.getContext('2d');
        var hintEl = document.getElementById('hint');
        var btnClear = document.getElementById('btn-clear');
        var btnSave = document.getElementById('btn-save');
        var btnQR = document.getElementById('btn-qr');
        var brushSlider = document.getElementById('brush-size');
        var qrOverlay = document.getElementById('qr-overlay');
        var qrCanvas = document.getElementById('qr-canvas');
        var qrUrlEl = document.getElementById('qr-url');
        var qrClose = document.getElementById('qr-close');
        var camOverlay = document.getElementById('cam-overlay');
        var btnAllow = document.getElementById('btn-allow');
        var bootSpinner = document.getElementById('boot-spinner');

        // ── State ─────────────────────────────────────────────────
        // strokes = [{pts:[{x,y}], erase:bool, width:num}]
        var strokes = [];
        var cur = null;   // current stroke object
        var drawing = false;
        var mode = 'draw'; // 'draw' | 'erase'
        var brushSize = 6;
        var sx = null, sy = null;  // smoothed cursor

        // ── Toolbar ───────────────────────────────────────────────
        brushSlider.addEventListener('input', function () { brushSize = +this.value; });

        btnClear.addEventListener('click', function () {
            strokes = []; cur = null; drawing = false;
        });

        btnSave.addEventListener('click', function () {
            // Render to a clean canvas without camera and save
            var tmp = document.createElement('canvas');
            tmp.width = window.innerWidth; tmp.height = window.innerHeight;
            var tc = tmp.getContext('2d');
            tc.fillStyle = '#000';
            tc.fillRect(0, 0, tmp.width, tmp.height);
            renderStrokes(tc, tmp.width, tmp.height);
            var a = document.createElement('a');
            a.download = 'handboard_' + Date.now() + '.png';
            a.href = tmp.toDataURL('image/png');
            a.click();
        });

        var qrGen = false;
        btnQR.addEventListener('click', function () {
            var url = window.location.href;
            qrUrlEl.textContent = url;
            if (!qrGen && typeof QRCode !== 'undefined') {
                QRCode.toCanvas(qrCanvas, url, {
                    width: 200, margin: 1,
                    color: { dark: '#000', light: '#fff' }
                }, function () { });
                qrGen = true;
            }
            qrOverlay.classList.add('show');
        });
        qrClose.addEventListener('click', function () { qrOverlay.classList.remove('show'); });
        qrOverlay.addEventListener('click', function (e) {
            if (e.target === qrOverlay) qrOverlay.classList.remove('show');
        });

        // ── Render all strokes onto a context ────────────────────
        function renderStrokes(tctx, w, h) {
            for (var i = 0; i < strokes.length; i++) {
                var s = strokes[i];
                if (s.pts.length === 0) continue;

                tctx.save();
                if (s.erase) {
                    // Erase = draw a thick black stroke over everything
                    tctx.globalCompositeOperation = 'destination-out';
                    tctx.strokeStyle = 'rgba(0,0,0,1)';
                    tctx.lineWidth = s.width * 4;
                    tctx.shadowBlur = 0;
                } else {
                    tctx.globalCompositeOperation = 'source-over';
                    tctx.shadowColor = 'rgba(255,255,255,0.35)';
                    tctx.shadowBlur = 8;
                    tctx.strokeStyle = '#fff';
                    tctx.lineWidth = s.width;
                }
                tctx.lineCap = 'round';
                tctx.lineJoin = 'round';

                tctx.beginPath();
                tctx.moveTo(s.pts[0].x, s.pts[0].y);
                if (s.pts.length === 1) {
                    tctx.arc(s.pts[0].x, s.pts[0].y, tctx.lineWidth / 2, 0, Math.PI * 2);
                    tctx.fillStyle = s.erase ? 'rgba(0,0,0,1)' : '#fff';
                    tctx.fill();
                } else {
                    for (var j = 1; j < s.pts.length; j++) tctx.lineTo(s.pts[j].x, s.pts[j].y);
                    tctx.stroke();
                }
                tctx.restore();
            }
        }

        // ── Gestures ─────────────────────────────────────────
        const THUMB_TIP = 4, INDEX_TIP = 8, INDEX_MCP = 5,
            MIDDLE_TIP = 12, MIDDLE_MCP = 9, RING_TIP = 16,
            RING_MCP = 13, PINKY_TIP = 20, PINKY_MCP = 17;

        function fingerExtended(lm, tip, mcp) {
            return (lm[mcp].y - lm[tip].y) > 0.04;
        }

        function isIndexPointing(lm) {
            return fingerExtended(lm, INDEX_TIP, INDEX_MCP) &&
                !fingerExtended(lm, MIDDLE_TIP, MIDDLE_MCP) &&
                !fingerExtended(lm, RING_TIP, RING_MCP) &&
                !fingerExtended(lm, PINKY_TIP, PINKY_MCP);
        }

        function isOpenPalm(lm) {
            return fingerExtended(lm, INDEX_TIP, INDEX_MCP) &&
                fingerExtended(lm, MIDDLE_TIP, MIDDLE_MCP) &&
                fingerExtended(lm, RING_TIP, RING_MCP) &&
                fingerExtended(lm, PINKY_TIP, PINKY_MCP);
        }

        function isFist(lm) {
            return !fingerExtended(lm, INDEX_TIP, INDEX_MCP) &&
                !fingerExtended(lm, MIDDLE_TIP, MIDDLE_MCP) &&
                !fingerExtended(lm, RING_TIP, RING_MCP);
        }

        // ── MediaPipe result handler (adaptive smoothing) ─────────
        function run(res) {
            c.width = window.innerWidth;
            c.height = window.innerHeight;

            // Black board
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, c.width, c.height);

            // Draw all strokes
            renderStrokes(ctx, c.width, c.height);

            if (!res.multiHandLandmarks || res.multiHandLandmarks.length === 0) {
                // No hand — finish stroke
                if (drawing && cur) strokes.push(cur);
                cur = null; drawing = false;
                sx = null; sy = null;
                hintEl.textContent = '☝️ Index finger = Draw · ✋ Open palm = Erase · ✊ Fist = Lift pen';
                return;
            }

            var lm = res.multiHandLandmarks[0];

            // Draw hand skeleton (same as original code, but fainter)
            drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.15)', lineWidth: 1 });
            drawLandmarks(ctx, lm, { color: 'rgba(255,255,255,0.5)', lineWidth: 1, radius: 2 });

            // Index tip — use raw ind.x since canvas is mirrored in CSS
            var ind = lm[8];
            var rx = ind.x * c.width;
            var ry = ind.y * c.height;

            // Simple 0.45 smoothing (user's preferred sensitivity)
            if (sx === null) {
                sx = rx; sy = ry;
            } else {
                sx += (rx - sx) * 0.45;
                sy += (ry - sy) * 0.45;
            }

            // Detect Gestures
            var pointing = isIndexPointing(lm);
            var palming = isOpenPalm(lm);

            // Cursor dot
            ctx.beginPath();
            ctx.arc(sx, sy, 7, 0, Math.PI * 2);
            ctx.fillStyle = palming ? 'rgba(150,150,150,0.6)' : (pointing ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.15)');
            ctx.shadowBlur = 0;
            ctx.fill();

            // ── Gesture Logic ──
            if (palming) {
                // ✋ Open palm = ERASE
                if (mode !== 'erase') {
                    if (drawing && cur) strokes.push(cur);
                    mode = 'erase';
                    drawing = false;
                }
                if (!drawing) {
                    drawing = true;
                    cur = { pts: [], erase: true, width: brushSize };
                }
                cur.pts.push({ x: sx, y: sy });
                hintEl.textContent = '✋ Erasing…';

            } else if (pointing) {
                // ☝️ One finger = DRAW
                if (mode !== 'draw') {
                    if (drawing && cur) strokes.push(cur);
                    mode = 'draw';
                    drawing = false;
                }
                if (!drawing) {
                    drawing = true;
                    cur = { pts: [], erase: false, width: brushSize };
                }
                cur.pts.push({ x: sx, y: sy });
                hintEl.textContent = '☝️ Drawing…';

            } else {
                // Anything else = PEN LIFTED
                if (drawing && cur) { strokes.push(cur); cur = null; }
                drawing = false;
                hintEl.textContent = '✊ Pen lifted — move freely';
            }
        }

        // ── Boot ─────────────────────────────────────────────────
        async function startCamera() {
            btnAllow.style.display = 'none';
            bootSpinner.style.display = 'block';
            try {
                var stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                camVideo.srcObject = stream;
                pipVideo.srcObject = stream;
                await camVideo.play();
                await pipVideo.play();

                camOverlay.classList.add('hidden');
                setTimeout(function () { camOverlay.style.display = 'none'; }, 450);

                var h = new Hands({
                    locateFile: function (file) {
                        return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
                    }
                });
                h.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                h.onResults(run);

                var cam = new Camera(camVideo, {
                    onFrame: async function () { await h.send({ image: camVideo }); },
                    width: 1280, height: 720
                });
                cam.start();

            } catch (err) {
                bootSpinner.style.display = 'none';
                btnAllow.style.display = 'block';
                btnAllow.textContent = '⟳ Try Again';
                document.querySelector('#cam-overlay p').textContent =
                    'Could not access camera. Make sure you tapped Allow, then retry.';
            }
        }

        btnAllow.addEventListener('click', startCamera);
        startCamera();
    </script>
</body>

</html>
