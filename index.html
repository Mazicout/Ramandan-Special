<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HandBoard — Draw With Your Hand</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="./qrcode.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --fg: #fff;
            --muted: #666;
            --border: #2a2a2a;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Fira Code', monospace;
            touch-action: none;
            user-select: none;
        }

        /* Hidden video feed — MediaPipe reads it but we don't show it */
        #cam-video {
            display: none;
        }

        /* Drawing canvas — fills full screen */
        #c {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Floating toolbar (pill, top centre) ── */
        #toolbar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            z-index: 50;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        #toolbar h1 {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: #fff;
        }

        .sep {
            width: 1px;
            height: 16px;
            background: var(--border);
        }

        .btn {
            background: transparent;
            border: 1px solid transparent;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 20px;
            transition: background 0.15s, border-color 0.15s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border);
        }

        .btn.active {
            background: #fff;
            color: #000;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .slider-label {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 58px;
            height: 3px;
            background: var(--border);
            outline: none;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        /* ── Floating PiP video (bottom-left) ── */
        #pip {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 130px;
            aspect-ratio: 9 / 16;
            border-radius: 14px;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 50;
            background: #111;
        }

        #pip-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }

        #pip-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
        }

        #pip-label {
            position: absolute;
            top: 5px;
            left: 7px;
            font-size: 8px;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.45);
        }

        /* ── Hint bar (bottom centre) ── */
        #hint {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 14px;
            font-size: 9px;
            letter-spacing: 0.1em;
            color: var(--muted);
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        /* ── Camera overlay ── */
        #cam-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 18px;
            transition: opacity 0.4s;
        }

        #cam-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #cam-overlay .icon {
            font-size: 52px;
        }

        #cam-overlay h2 {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: #fff;
        }

        #cam-overlay p {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            max-width: 280px;
            line-height: 1.8;
            letter-spacing: 0.08em;
        }

        #btn-allow {
            margin-top: 8px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 40px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 600;
            padding: 14px 36px;
            cursor: pointer;
            letter-spacing: 0.1em;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #222;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── QR Modal ── */
        #qr-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        #qr-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #qr-box {
            background: #fff;
            color: #000;
            border-radius: 12px;
            padding: 24px 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        #qr-box p {
            font-size: 10px;
            letter-spacing: 0.12em;
            color: #555;
        }

        #qr-url {
            font-size: 11px;
            font-weight: 600;
            word-break: break-all;
            text-align: center;
            max-width: 220px;
        }

        #qr-close {
            background: #000;
            color: #fff;
            border: none;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            padding: 8px 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            #toolbar {
                gap: 5px;
                padding: 5px 10px;
            }

            #toolbar h1 {
                display: none;
            }

            .btn {
                font-size: 10px;
                padding: 4px 8px;
            }

            #pip {
                width: 100px;
            }
        }
    </style>
</head>

<body>

    <!-- Hidden video for MediaPipe -->
    <video id="cam-video" autoplay playsinline muted></video>

    <!-- Main drawing canvas (full screen) -->
    <canvas id="c"></canvas>

    <!-- Hint -->
    <div id="hint">☝️ One finger = Draw &nbsp;·&nbsp; 👌 Pinch = Move (lift pen)</div>

    <!-- Floating toolbar -->
    <div id="toolbar">
        <h1>✦ HandBoard</h1>
        <div class="sep"></div>
        <div class="slider-wrap">
            <span class="slider-label">Size</span>
            <input type="range" id="brush-size" min="1" max="30" value="5" />
        </div>
        <div class="sep"></div>
        <button class="btn" id="btn-clear">⊘ Clear</button>
        <button class="btn" id="btn-save">↓ Save</button>
        <div class="sep"></div>
        <button class="btn" id="btn-qr">⊞ QR</button>
    </div>

    <!-- Floating PiP video -->
    <div id="pip">
        <video id="pip-video" autoplay playsinline muted></video>
        <canvas id="pip-canvas"></canvas>
        <span id="pip-label">📷 live</span>
    </div>

    <!-- Camera overlay -->
    <div id="cam-overlay">
        <div class="icon">📷</div>
        <h2>Camera Access</h2>
        <p>HandBoard needs your camera to track your hand. Tap the button and allow access.</p>
        <button id="btn-allow">Open Camera</button>
        <div class="spinner" id="boot-spinner" style="display:none"></div>
    </div>

    <!-- QR Modal -->
    <div id="qr-overlay">
        <div id="qr-box">
            <p>SCAN TO OPEN ON PHONE</p>
            <canvas id="qr-canvas"></canvas>
            <div id="qr-url"></div>
            <button id="qr-close">✕ Close</button>
        </div>
    </div>

    <script>
        // ── Refs ──────────────────────────────────────────────────
        const camVideo = document.getElementById('cam-video');
        const pipVideo = document.getElementById('pip-video');
        const pipCanvas = document.getElementById('pip-canvas');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const pipCtx = pipCanvas.getContext('2d');
        const hintEl = document.getElementById('hint');
        const brushSlider = document.getElementById('brush-size');
        const btnClear = document.getElementById('btn-clear');
        const btnSave = document.getElementById('btn-save');
        const btnQR = document.getElementById('btn-qr');
        const qrOverlay = document.getElementById('qr-overlay');
        const qrCanvas = document.getElementById('qr-canvas');
        const qrUrlEl = document.getElementById('qr-url');
        const qrClose = document.getElementById('qr-close');
        const camOverlay = document.getElementById('cam-overlay');
        const btnAllow = document.getElementById('btn-allow');
        const bootSpinner = document.getElementById('boot-spinner');
        const pipEl = document.getElementById('pip');

        // ── Drawing state ─────────────────────────────────────────
        // Strokes: array of arrays of {x,y} points (completed strokes)
        var strokes = [];
        var curStroke = [];   // current live stroke
        var isDrawing = false;

        // Smoothed cursor coords (user's 0.45 factor — feels great)
        var sx = null, sy = null;
        var brushSize = 5;

        // ── Resize canvas ─────────────────────────────────────────
        function resize() {
            // Preserve drawing by saving to temp
            const tmp = document.createElement('canvas');
            tmp.width = c.width; tmp.height = c.height;
            tmp.getContext('2d').drawImage(c, 0, 0);
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            render(); // full redraw from stroke data

            // Resize pip canvas
            const pipRect = pipEl.getBoundingClientRect();
            pipCanvas.width = pipRect.width;
            pipCanvas.height = pipRect.height;
        }
        window.addEventListener('resize', resize);

        // ── Render all strokes (called every frame) ────────────────
        function render() {
            // Black board
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, c.width, c.height);

            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#fff';
            ctx.shadowColor = 'rgba(255,255,255,0.4)';
            ctx.shadowBlur = 6;

            // Draw all completed strokes
            for (var i = 0; i < strokes.length; i++) {
                drawStrokeArr(strokes[i]);
            }
            // Draw active stroke
            if (curStroke.length > 0) drawStrokeArr(curStroke);
        }

        function drawStrokeArr(pts) {
            if (pts.length === 0) return;
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            if (pts.length === 1) {
                // Single dot
                ctx.arc(pts[0].x, pts[0].y, ctx.lineWidth / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                return;
            }
            for (var j = 1; j < pts.length; j++) {
                ctx.lineTo(pts[j].x, pts[j].y);
            }
            ctx.stroke();
        }

        // ── Toolbar ───────────────────────────────────────────────
        brushSlider.addEventListener('input', () => brushSize = +brushSlider.value);

        btnClear.addEventListener('click', () => {
            strokes = []; curStroke = []; isDrawing = false;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, c.width, c.height);
        });

        btnSave.addEventListener('click', () => {
            const a = document.createElement('a');
            a.download = `handboard_${Date.now()}.png`;
            a.href = c.toDataURL('image/png');
            a.click();
        });

        // QR
        let qrGen = false;
        btnQR.addEventListener('click', () => {
            const url = window.location.href;
            qrUrlEl.textContent = url;
            if (!qrGen && typeof QRCode !== 'undefined') {
                QRCode.toCanvas(qrCanvas, url, {
                    width: 200, margin: 1,
                    color: { dark: '#000', light: '#fff' }
                }, () => { });
                qrGen = true;
            }
            qrOverlay.classList.add('show');
        });
        qrClose.addEventListener('click', () => qrOverlay.classList.remove('show'));
        qrOverlay.addEventListener('click', e => { if (e.target === qrOverlay) qrOverlay.classList.remove('show'); });

        // ── Gesture helpers ───────────────────────────────────────
        // 👌 pinch: thumb tip (4) close to index tip (8)
        function isPinch(lm) {
            var dx = lm[4].x - lm[8].x;
            var dy = lm[4].y - lm[8].y;
            return Math.sqrt(dx * dx + dy * dy) < 0.07;
        }

        // ── MediaPipe result handler ──────────────────────────────
        function onResults(res) {
            // Resize canvas each frame (handles orientation changes)
            c.width = window.innerWidth;
            c.height = window.innerHeight;

            render();

            // Draw pip skeleton
            const pipRect = pipEl.getBoundingClientRect();
            pipCanvas.width = pipRect.width;
            pipCanvas.height = pipRect.height;
            pipCtx.clearRect(0, 0, pipCanvas.width, pipCanvas.height);

            if (!res.multiHandLandmarks || res.multiHandLandmarks.length === 0) {
                // No hand — end stroke
                if (isDrawing && curStroke.length > 1) strokes.push(curStroke);
                curStroke = []; isDrawing = false;
                sx = null; sy = null;
                hintEl.textContent = '☝️ One finger = Draw · 👌 Pinch = Move (lift pen)';
                return;
            }

            var lm = res.multiHandLandmarks[0];

            // Draw skeleton on pip
            drawConnectors(pipCtx, lm, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.35)', lineWidth: 1 });
            drawLandmarks(pipCtx, lm, { color: '#fff', lineWidth: 1, radius: 2 });

            // Finger tip (index = lm[8]) — video is NOT mirrored for MediaPipe coords,
            // but canvas is mirrored via CSS, so we flip x for drawing
            var ind = lm[8];
            var rx = (1 - ind.x) * c.width;   // flip X to match mirrored display
            var ry = ind.y * c.height;

            // 0.45 smoothing (user's preferred factor)
            if (sx === null) { sx = rx; sy = ry; }
            else { sx += (rx - sx) * 0.45; sy += (ry - sy) * 0.45; }

            // Draw cursor dot
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(sx, sy, 7, 0, Math.PI * 2);
            ctx.fillStyle = isPinch(lm) ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.6)';
            ctx.fill();
            ctx.restore();

            // ── Gesture: pinch = MOVE (lift pen), no pinch = DRAW
            if (isPinch(lm)) {
                // 👌 Pinch — lift pen, reposition without drawing
                if (isDrawing && curStroke.length > 1) strokes.push(curStroke);
                curStroke = []; isDrawing = false;
                hintEl.textContent = '👌 Moving — pen lifted';
            } else {
                // ☝️ Regular pointing — DRAW
                if (!isDrawing) {
                    isDrawing = true;
                    curStroke = [];
                }
                curStroke.push({ x: sx, y: sy });
                hintEl.textContent = '☝️ Drawing…';
            }
        }

        // ── Boot ──────────────────────────────────────────────────
        async function startCamera() {
            btnAllow.style.display = 'none';
            bootSpinner.style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                camVideo.srcObject = stream;
                pipVideo.srcObject = stream;   // same stream → pip preview
                await camVideo.play();
                await pipVideo.play();

                camOverlay.classList.add('hidden');
                setTimeout(() => camOverlay.style.display = 'none', 450);

                resize();
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, c.width, c.height);

                const hands = new Hands({
                    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
                });
                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                hands.onResults(onResults);

                const camera = new Camera(camVideo, {
                    onFrame: async () => await hands.send({ image: camVideo }),
                    width: 1280, height: 720
                });
                await camera.start();

            } catch (err) {
                bootSpinner.style.display = 'none';
                btnAllow.style.display = 'block';
                btnAllow.textContent = '⟳ Try Again';
                document.querySelector('#cam-overlay p').textContent =
                    'Could not access camera. Make sure you tapped Allow, then retry.';
            }
        }

        btnAllow.addEventListener('click', startCamera);
        startCamera();
    </script>
</body>

</html>
